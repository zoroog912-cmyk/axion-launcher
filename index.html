<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="titlebar">
        <div class="brand-badge">
            <span class="pulse-dot"></span>
            <span class="server-title">AXION LAUNCHER</span>
        </div>
        <div class="window-controls">
            <button id="close-btn" onclick="closeApp()">✕</button>
        </div>
    </div>

    <div class="launcher-container">
        <div class="control-board">
            <div class="branding-header">
                <h1 class="logo-text">AXION</h1>
                <p class="logo-sub">HYBRID MULTIPLAYER CLIENT</p>
            </div>

            <div class="compact-form">
                <div class="input-card">
                    <label>CHARACTER IDENTITY</label>
                    <input type="text" id="player-name" placeholder="Firstname_Lastname">
                </div>

                <div class="input-card micro-card">
                    <label>GTA ROOT PATH</label>
                    <div class="compact-path-row">
                        <input type="text" id="gta-path" placeholder="Not located" readonly>
                        <button class="mini-btn" onclick="locateGta()">SET</button>
                    </div>
                </div>
            </div>

            <div class="action-card">
                <button id="play-btn" onclick="launchGame()">
                    <span class="btn-primary-txt">LAUNCH SESSION</span>
                    <span id="btn-sub-txt" class="btn-sub-txt">CONNECTING TO HOST...</span>
                </button>
            </div>
        </div>

        <div class="dashboard-workspace">
            <div class="telemetry-bar">
                <div class="telemetry-node">
                    <span class="node-lbl">INFRASTRUCTURE</span>
                    <span id="srv-status" class="status-offline">SYNCING</span>
                </div>
                <div class="telemetry-node">
                    <span class="node-lbl">NETWORK PING</span>
                    <span id="srv-ping" class="node-val">-- ms</span>
                </div>
                <div class="telemetry-node">
                    <span class="node-lbl">GAMEMODE LAYER</span>
                    <span id="srv-mode" class="node-val-text">Fetching...</span>
                </div>
            </div>

            <div class="server-identity-header">
                <h2 id="srv-name">SECURE AXION CONNECTOR</h2>
                <div class="server-pop-counter">
                    <span id="srv-players" class="numeric-glow">0</span> / <span id="srv-max" class="numeric-glow">0</span> PLAYERS ONLINE
                </div>
                <div class="h-progress-bar"><div id="player-progress" style="width: 0%"></div></div>
            </div>

            <div class="player-table-container">
                <div class="table-header">
                    <span class="col-id">ID</span>
                    <span class="col-name">PLAYER IDENTIFICATION</span>
                    <span class="col-ping">LATENCY</span>
                </div>
                <div id="player-rows-wrapper" class="player-rows-wrapper">
                    <div class="system-log-message">Loading diagnostic server data fields...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { ipcRenderer } = require('electron');

        // Request initial load configurations
        ipcRenderer.send('get-saved-settings');
        refreshStats();
        setInterval(refreshStats, 5000); // 5-second polling loop for player list and ping

        ipcRenderer.on('saved-settings-data', (event, data) => {
            if(data.gtaPath) document.getElementById('gta-path').value = data.gtaPath;
            if(data.playerName) document.getElementById('player-name').value = data.playerName;
        });

        ipcRenderer.on('path-updated', (event, cleanPath) => {
            document.getElementById('gta-path').value = cleanPath;
        });

        // Background script listener handling modpack installation stages
        ipcRenderer.on('download-status', (event, message) => {
            document.getElementById('btn-sub-txt').innerText = message;
            
            if (message.includes("DOWNLOADING") || message.includes("EXTRACTING")) {
                document.getElementById('play-btn').disabled = true;
                document.getElementById('play-btn').style.opacity = "0.6";
                document.getElementById('play-btn').style.cursor = "not-allowed";
            } else {
                document.getElementById('play-btn').disabled = false;
                document.getElementById('play-btn').style.opacity = "1";
                document.getElementById('play-btn').style.cursor = "pointer";
            }
        });

        ipcRenderer.on('advanced-stats-response', (event, stats) => {
            const statusEl = document.getElementById('srv-status');
            statusEl.innerText = stats.status.toUpperCase();
            statusEl.className = stats.status === "Online" ? "status-online" : "status-offline";
            
            document.getElementById('srv-ping').innerText = `${stats.ping} ms`;
            document.getElementById('srv-name').innerText = stats.hostname.toUpperCase();
            document.getElementById('srv-players').innerText = stats.players;
            document.getElementById('srv-max').innerText = stats.maxplayers;
            document.getElementById('srv-mode').innerText = stats.gamemode;
            
            // Do not override button text if it is busy processing mod installations
            const currentSubText = document.getElementById('btn-sub-txt').innerText;
            if (!currentSubText.includes("DOWNLOADING") && !currentSubText.includes("EXTRACTING")) {
                document.getElementById('btn-sub-txt').innerText = stats.status === "Online" ? "SECURE INSTANCE READY" : "SERVER HOST OFFLINE";
            }

            const percent = stats.maxplayers > 0 ? (stats.players / stats.maxplayers) * 100 : 0;
            document.getElementById('player-progress').style.width = `${percent}%`;

            const wrapper = document.getElementById('player-rows-wrapper');
            if (stats.status === "Online" && Array.isArray(stats.player_list) && stats.player_list.length > 0) {
                wrapper.innerHTML = '';
                stats.player_list.forEach(p => {
                    const row = document.createElement('div');
                    row.className = 'player-table-row';
                    row.innerHTML = `
                        <span class="col-id">${p.id ?? '0'}</span>
                        <span class="col-name">${p.name ?? 'Unknown'}</span>
                        <span class="col-ping text-green">${p.ping ?? stats.ping}ms</span>
                    `;
                    wrapper.appendChild(row);
                });
            } else if (stats.status === "Online") {
                wrapper.innerHTML = `<div class="system-log-message-success">${stats.players} active clients securely connected to sandbox instance.</div>`;
            } else {
                wrapper.innerHTML = `<div class="system-log-message-err">Fatal: Core networking nodes failed responding via queries.</div>`;
            }
        });

        function locateGta() { ipcRenderer.send('select-gta-path'); }
        function refreshStats() { ipcRenderer.send('get-advanced-stats'); }
        function closeApp() { ipcRenderer.send('close-app'); }

        function launchGame() {
            const gtaPath = document.getElementById('gta-path').value;
            const playerName = document.getElementById('player-name').value;
            if(!gtaPath) { alert("Configure game file root path first."); return; }
            if(!playerName || playerName.length < 3) { alert("Character designation requirements unfulfilled."); return; }
            ipcRenderer.send('launch-game', { gtaPath, playerName });
        }
    </script>
</body>
</html>
